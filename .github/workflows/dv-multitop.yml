name: DVSim Multi-top block-level tests
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: "zerorisc-dv"
      run-type:
        type: string
        required: true
      item:
        type: string
        required: true
      tool:
        type: string
        default: "vcs"
      coverage:
        type: boolean
        default: false
      concurrent-jobs:
        type: number
        default: 0
      priority:
        type: number
        # Smaller numbers are higher priority.
        default: 10
      verilator-version:
        # Use a verilator version that supports pyUVM tests.
        default: "5.036"
        type: string
      vcs-version:
        default: "U-2023.03-SP2"
        type: string
      timeout-minutes:
        type: number
        default: 1440  # 24 hours

#permissions:
#  # Needed for determining HWIP set to run
#  pull-requests: read

jobs:
  dv-multitop:
    name: Run Multitop Design Verification Tests
    runs-on:
      group: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    # TODO: Filter DV jobs based on changed paths (`if-changed`).
    - name: Prepare environment
      id: prepare-env
      uses: ./.github/actions/prepare-env
      with:
        service_account_json: '${{ secrets.BAZEL_CACHE_CREDS }}'
        ts-oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        ts-oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
        vcs-version: ${{ inputs.vcs-version }}
        verilator-version: ${{ inputs.verilator-version }}
    # Unit tests for UVCs
    - name: TL Agent unit tests
      if: ${{ success() || failure() }}
      uses: ./.github/actions/dvsim
      with:
        run-type: ${{ inputs.run-type }}
        sim-name: ${{ inputs.run-type }}-dv-tl-agent
        hjson: hw/dv/sv/tl_agent/dv/tl_agent_sim_cfg.hjson
        item: ${{ inputs.item }}
        coverage: ${{ inputs.coverage }}
        concurrent-jobs: ${{ inputs.concurrent-jobs }}
        priority: ${{ inputs.priority }}
    - name: TL Agent unit tests (pyUVM/Verilator)
      if: ${{ success() || failure() }}
      uses: ./.github/actions/dvsim
      with:
        run-type: ${{ inputs.run-type }}
        sim-name: ${{ inputs.run-type }}-dv-tl-agent
        hjson: hw/dv/py/tl_agent/dv/tl_agent_python_sim_cfg.hjson
        item: ${{ inputs.item }}
        coverage: ${{ inputs.coverage }}
        concurrent-jobs: ${{ inputs.concurrent-jobs }}
        priority: ${{ inputs.priority }}
        tool: verilator

    # Multi-top IPs

    # AES Unmasked
    - name: AES Unmasked
      if: ${{ success() || failure() }}
      uses: ./.github/actions/dvsim
      with:
        run-type: ${{ inputs.run-type }}
        sim-name: ${{ inputs.run-type }}-dv-aes-unmasked
        hjson: hw/ip/aes/dv/aes_unmasked_sim_cfg.hjson
        item: ${{ inputs.item }}
        coverage: ${{ inputs.coverage }}
        concurrent-jobs: ${{ inputs.concurrent-jobs }}
        priority: ${{ inputs.priority }}
    # AES Masked
    - name: AES Masked
      if: ${{ success() || failure() }}
      uses: ./.github/actions/dvsim
      with:
        run-type: ${{ inputs.run-type }}
        sim-name: ${{ inputs.run-type }}-dv-aes-masked
