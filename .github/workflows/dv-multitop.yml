  dv-spisi:
    name: Run SPISI Design Verification Tests
    runs-on:
      group: zerorisc-dv-spisi 
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Prepare environment
      id: prepare-env
      uses: ./.github/actions/prepare-env
      with:
        service_account_json: '${{ secrets.BAZEL_CACHE_CREDS }}'
        ts-oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        ts-oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
        vcs-version: ${{ inputs.vcs-version }}
    # Flash SPISI
    - name: Flash SPISI
      if: ${{ success() || failure() }}
      uses: ./.github/actions/dvsim
      with:
        run-type: ${{ inputs.run-type }}
        sim-name: ${{ inputs.run-type }}-dv-flash-spisi
        hjson: hw/ip/flash_spisi/dv/flash_spisi_sim_cfg.hjson
        item: ${{ inputs.item }}
        coverage: ${{ inputs.coverage }}
        concurrent-jobs: ${{ inputs.concurrent-jobs }}
        priority: ${{ inputs.priority }}
        fusesoc-core-path: /tools/secrets/spisi
